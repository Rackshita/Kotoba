<div class="min-h-screen flex bg-gradient-to-br from-slate-900 via-blue-900 to-indigo-900">

  <!-- Left Side -->
  <div class="hidden lg:flex w-1/2 flex-col items-center justify-center text-white p-12">
    <img src="Kotoba.png" alt="Kotoba Logo" class="w-32 mb-6 drop-shadow-lg">
    <h1 class="text-4xl font-bold mb-4">Join Kotoba</h1>
    <p class="text-blue-200 text-center max-w-md">
      Build strong Japanese vocabulary with smart spaced repetition and daily micro-learning.
    </p>
  </div>

  <!-- Right Side -->
  <div class="flex w-full lg:w-1/2 items-center justify-center">
    <div class="bg-white/10 backdrop-blur-lg p-10 rounded-2xl shadow-2xl w-full max-w-md text-white">

      <h2 class="text-3xl font-semibold mb-6 text-center">Create Account</h2>

      <form (ngSubmit)="onRegister()" class="space-y-5">

        <!-- Username -->
        <input
          type="text"
          [(ngModel)]="username"
          name="username"
          placeholder="Username"
          required
          class="w-full px-4 py-3 rounded-lg bg-white/20 focus:outline-none focus:ring-2 focus:ring-blue-400 placeholder-white/70"
        />

        <!-- Email -->
        <input
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="Email"
          required
          class="w-full px-4 py-3 rounded-lg bg-white/20 focus:outline-none focus:ring-2 focus:ring-blue-400 placeholder-white/70"
        />

        <!-- Password -->
        <input
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="Password"
          required
          class="w-full px-4 py-3 rounded-lg bg-white/20 focus:outline-none focus:ring-2 focus:ring-blue-400 placeholder-white/70"
        />

        <!-- Error Message -->
        <div *ngIf="errorMessage" class="text-red-400 text-sm text-center">
          {{ errorMessage }}
        </div>

        <!-- Success Message -->
        <div *ngIf="successMessage" class="text-green-400 text-sm text-center">
          {{ successMessage }}
        </div>

        <!-- Button -->
        <button
          type="submit"
          class="w-full bg-blue-500 hover:bg-blue-600 transition duration-300 py-3 rounded-lg font-semibold"
        >
          Sign Up
        </button>

      </form>

      <p class="mt-6 text-center text-sm text-blue-200">
        Already have an account?
        <a routerLink="/" class="text-blue-400 hover:underline">
          Login
        </a>
      </p>

    </div>
  </div>

</div>
